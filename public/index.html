<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BWCA Trail Editor</title>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.css" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    
    .container {
      display: flex;
      height: 100vh;
    }
    
    #map {
      flex: 1;
      height: 100%;
    }
    
    .sidebar {
      width: 350px;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .sidebar-header {
      padding: 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    
    .sidebar-header h1 {
      font-size: 18px;
      margin-bottom: 5px;
    }
    
    .sidebar-header .subtitle {
      font-size: 12px;
      color: #888;
    }
    
    .progress-bar {
      margin-top: 15px;
      background: #0f3460;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00b4d8, #0077b6);
      transition: width 0.3s;
    }
    
    .progress-text {
      font-size: 11px;
      color: #888;
      margin-top: 5px;
    }
    
    .panel {
      padding: 15px;
      border-bottom: 1px solid #0f3460;
    }
    
    .panel-title {
      font-size: 12px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 10px;
    }
    
    .trail-info {
      background: #16213e;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    
    .trail-name {
      font-weight: 600;
      margin-bottom: 5px;
    }
    
    .trail-stats {
      font-size: 12px;
      color: #888;
    }
    
    .recommendation {
      background: #0f3460;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
      font-size: 13px;
    }
    
    .recommendation.snap { border-left: 3px solid #00b4d8; }
    .recommendation.keep { border-left: 3px solid #4caf50; }
    .recommendation.consolidate { border-left: 3px solid #ff9800; }
    
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    button:hover { transform: translateY(-1px); }
    
    .btn-primary {
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      color: #fff;
    }
    
    .btn-secondary {
      background: #0f3460;
      color: #fff;
    }
    
    .btn-skip {
      background: transparent;
      color: #888;
      border: 1px solid #333;
    }
    
    .btn-edit {
      background: #ff9800;
      color: #fff;
    }
    
    .btn-edit.active {
      background: #4caf50;
      box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
    }
    
    .btn-simplify {
      background: #9c27b0;
      color: #fff;
    }
    
    .btn-portage {
      background: #795548;
      color: #fff;
    }
    
    .btn-mark-portage {
      background: #607d8b;
      color: #fff;
    }
    
    .btn-mark-portage.active {
      background: #ff5722;
      animation: pulse 1s infinite;
    }
    
    .btn-clear-portages {
      background: #f44336;
      color: #fff;
    }
    
    .btn-create {
      background: #2196f3;
      color: #fff;
    }
    
    .btn-create.drawing {
      background: #4caf50;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.show {
      display: flex;
    }
    
    .modal-content {
      background: #1a1a2e;
      padding: 25px;
      border-radius: 10px;
      min-width: 350px;
      color: #fff;
    }
    
    .modal-content h3 {
      margin-bottom: 15px;
    }
    
    .modal-content input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #0f3460;
      border-radius: 6px;
      background: #16213e;
      color: #fff;
      font-size: 14px;
    }
    
    .modal-content input:focus {
      outline: none;
      border-color: #00b4d8;
    }
    
    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    
    .trail-select {
      width: 100%;
      padding: 10px;
      border: 1px solid #0f3460;
      border-radius: 6px;
      background: #16213e;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
    }
    
    .trail-select:focus {
      outline: none;
      border-color: #00b4d8;
    }
    
    .trail-select option {
      background: #16213e;
      color: #fff;
    }
    
    .log {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }
    
    .log-entry {
      font-size: 12px;
      padding: 8px;
      margin-bottom: 5px;
      background: #16213e;
      border-radius: 4px;
      border-left: 3px solid #333;
    }
    
    .log-entry.success { border-left-color: #4caf50; }
    .log-entry.info { border-left-color: #00b4d8; }
    .log-entry.warning { border-left-color: #ff9800; }
    
    .log-time {
      color: #666;
      font-size: 10px;
    }
    
    .legend {
      padding: 15px;
      background: #16213e;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      margin-bottom: 5px;
    }
    
    .legend-color {
      width: 20px;
      height: 3px;
      border-radius: 2px;
    }
    
    .legend-item.toggle {
      cursor: pointer;
    }
    
    .legend-item.toggle:hover {
      background: rgba(255,255,255,0.1);
      margin: -2px -5px;
      padding: 2px 5px;
      border-radius: 4px;
    }
    
    .legend-item input[type="checkbox"] {
      margin-right: 5px;
    }
    
    .loading {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 20px 40px;
      border-radius: 8px;
      color: #fff;
      z-index: 1000;
    }
    
    .loading.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div id="map"></div>
    
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>🛶 BWCA Trail Editor</h1>
        <div class="subtitle">AI-Assisted GIS Tool</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
        <div class="progress-text" id="progress-text">Loading...</div>
      </div>
      
      <div class="panel">
        <div class="panel-title">Select Trail</div>
        <select id="trail-select" class="trail-select">
          <option value="">-- Choose a trail --</option>
        </select>
      </div>
      
      <div class="panel">
        <div class="panel-title">Current Trail</div>
        <div class="trail-info" id="trail-info">
          <div class="trail-name" id="trail-name">No trail selected</div>
          <div class="trail-stats" id="trail-stats">-</div>
        </div>
        <div class="recommendation" id="recommendation" style="display:none">
          <strong>Recommendation:</strong> <span id="rec-text"></span>
        </div>
      </div>
      
      <div class="panel">
        <div class="panel-title">Actions</div>
        <div class="actions">
          <button class="btn-primary" id="btn-snap" disabled>Snap to NHD</button>
          <button class="btn-portage" id="btn-portage" disabled>🥾 Snap Portage</button>
          <button class="btn-mark-portage" id="btn-mark-portage" disabled>🏕️ Mark Portage</button>
          <button class="btn-clear-portages" id="btn-clear-portages" disabled>🗑️ Clear Portages</button>
          <button class="btn-edit" id="btn-edit" disabled>✏️ Edit Trail</button>
          <button class="btn-simplify" id="btn-simplify" disabled>🔧 Simplify</button>
          <button class="btn-create" id="btn-create">➕ Create New</button>
          <button class="btn-secondary" id="btn-undo" disabled>Undo</button>
        </div>
      </div>
      
      <div class="log" id="log">
        <div class="log-entry info">
          <div>Welcome! Click "Next Trail" to begin.</div>
          <div class="log-time">System</div>
        </div>
      </div>
      
      <div class="legend">
        <div class="legend-item toggle" id="toggle-portages">
          <input type="checkbox" id="chk-portages" checked>
          <div class="legend-color" style="background: #e91e63; border-radius: 50%; width: 10px; height: 10px;"></div>
          <span>Portage Landings</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #0066ff"></div>
          <span>NHD Flowlines</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #ff3333"></div>
          <span>Original Trail</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #00cc44"></div>
          <span>Edited Trail</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #ff9800; height: 5px;"></div>
          <span>Portage Section</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #ffcc00"></div>
          <span>Current Working</span>
        </div>
      </div>
    </div>
  </div>
  
  <div class="loading" id="loading">Processing...</div>
  
  <!-- Create Trail Modal -->
  <div class="modal" id="create-modal">
    <div class="modal-content">
      <h3>➕ Create New Trail</h3>
      <label>Trail Name:</label>
      <input type="text" id="new-trail-name" placeholder="e.g., Knife Lake Portage">
      <label>Trail ID (optional):</label>
      <input type="text" id="new-trail-id" placeholder="Auto-generated if empty">
      <div class="modal-buttons">
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-start-draw">Start Drawing</button>
      </div>
    </div>
  </div>

  <script>
    // State
    let map = null;
    let draw = null;
    let currentTrail = null;
    let session = null;
    let isEditing = false;
    
    // Initialize app
    async function initApp() {
      // Fetch config from server
      const configRes = await fetch('/api/config');
      const config = await configRes.json();
      
      // Initialize Mapbox
      mapboxgl.accessToken = config.mapboxToken;
      
      map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/satellite-streets-v12',
        center: [-91.5, 48.0],
        zoom: 8
      });
      
      // Initialize Mapbox Draw for polyline editing
      draw = new MapboxDraw({
        displayControlsDefault: false,
        controls: {
          line_string: false,
          trash: true
        },
        defaultMode: 'simple_select',
        styles: [
          // Line style
          {
            id: 'gl-draw-line',
            type: 'line',
            filter: ['all', ['==', '$type', 'LineString']],
            paint: {
              'line-color': '#ffcc00',
              'line-width': 4
            }
          },
          // Vertex points
          {
            id: 'gl-draw-point',
            type: 'circle',
            filter: ['all', ['==', '$type', 'Point'], ['==', 'meta', 'vertex']],
            paint: {
              'circle-radius': 6,
              'circle-color': '#fff',
              'circle-stroke-color': '#ffcc00',
              'circle-stroke-width': 2
            }
          },
          // Midpoints
          {
            id: 'gl-draw-point-midpoint',
            type: 'circle',
            filter: ['all', ['==', '$type', 'Point'], ['==', 'meta', 'midpoint']],
            paint: {
              'circle-radius': 4,
              'circle-color': '#ffcc00'
            }
          }
        ]
      });
      
      map.addControl(draw, 'top-left');
      
      // Listen for draw updates
      map.on('draw.update', handleDrawUpdate);
      map.on('draw.selectionchange', handleDrawSelection);
      
      // Socket.io
      const socket = io();
      
      socket.on('trail:updated', (data) => {
        log(`Trail ${data.trailId} updated (${data.operation})`, 'success');
        // Don't reload while editing - user is actively modifying
        if (data.trailId === currentTrail?.id && !isEditing) {
          loadTrail(data.trailId);
        }
      });
      
      // Wait for map to load
      map.on('load', async () => {
        await loadSession();
        await loadPortageLandings();
        log('Ready! Click "Next Trail" to start editing.', 'success');
        log('💡 Tip: Click "Edit Trail" to drag vertices', 'info');
      });
    }
    
    // Load portage landings reference layer
    async function loadPortageLandings() {
      try {
        const res = await fetch('/api/portage-landings');
        const geojson = await res.json();
        
        map.addSource('portage-landings', {
          type: 'geojson',
          data: geojson
        });
        
        // Add circle layer for portage points
        map.addLayer({
          id: 'portage-landings-layer',
          type: 'circle',
          source: 'portage-landings',
          paint: {
            'circle-radius': 6,
            'circle-color': '#e91e63',
            'circle-stroke-color': '#fff',
            'circle-stroke-width': 2
          }
        });
        
        // Add popup on click
        map.on('click', 'portage-landings-layer', (e) => {
          const props = e.features[0].properties;
          new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`
              <strong>Portage ${props.name}</strong><br>
              ${props.distanceM}m (${props.distanceRods} rods)<br>
              Difficulty: ${props.difficulty || 'unknown'}
            `)
            .addTo(map);
        });
        
        // Change cursor on hover
        map.on('mouseenter', 'portage-landings-layer', () => {
          map.getCanvas().style.cursor = 'pointer';
        });
        map.on('mouseleave', 'portage-landings-layer', () => {
          map.getCanvas().style.cursor = '';
        });
        
        log(`Loaded ${geojson.features.length} portage landings`, 'info');
        
        // Set up toggle
        document.getElementById('chk-portages').addEventListener('change', (e) => {
          map.setLayoutProperty('portage-landings-layer', 'visibility', 
            e.target.checked ? 'visible' : 'none');
        });
        
      } catch (err) {
        console.error('Failed to load portage landings:', err);
      }
    }
    
    // Handle draw updates (when user drags a vertex)
    async function handleDrawUpdate(e) {
      if (!currentTrail || !isEditing) return;
      
      const feature = e.features[0];
      if (feature && feature.geometry) {
        // Save the edited geometry
        try {
          const res = await fetch('/api/draw/update-geometry', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              trailId: currentTrail.id,
              geometry: feature.geometry
            })
          });
          const data = await res.json();
          if (data.success) {
            log('Trail geometry updated', 'success');
          }
        } catch (err) {
          log('Failed to save edit: ' + err.message, 'error');
        }
      }
    }
    
    function handleDrawSelection(e) {
      // Could add selection handling here
    }
    
    // Start app
    initApp();
    
    // DOM elements
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const trailName = document.getElementById('trail-name');
    const trailStats = document.getElementById('trail-stats');
    const recommendation = document.getElementById('recommendation');
    const recText = document.getElementById('rec-text');
    const logEl = document.getElementById('log');
    const loading = document.getElementById('loading');
    
    const btnSnap = document.getElementById('btn-snap');
    const btnPortage = document.getElementById('btn-portage');
    const btnMarkPortage = document.getElementById('btn-mark-portage');
    const btnClearPortages = document.getElementById('btn-clear-portages');
    const btnEdit = document.getElementById('btn-edit');
    const btnSimplify = document.getElementById('btn-simplify');
    const btnCreate = document.getElementById('btn-create');
    const btnUndo = document.getElementById('btn-undo');
    const trailSelect = document.getElementById('trail-select');
    
    // Modal elements
    const createModal = document.getElementById('create-modal');
    const newTrailName = document.getElementById('new-trail-name');
    const newTrailId = document.getElementById('new-trail-id');
    const modalCancel = document.getElementById('modal-cancel');
    const modalStartDraw = document.getElementById('modal-start-draw');
    
    // Event listeners
    trailSelect.onchange = () => {
      if (trailSelect.value) loadTrail(trailSelect.value);
    };
    btnSnap.onclick = () => snapCurrentTrail();
    btnPortage.onclick = () => snapToPortage();
    btnMarkPortage.onclick = () => startMarkPortageMode();
    btnClearPortages.onclick = () => clearPortages();
    btnEdit.onclick = () => toggleEditMode();
    btnSimplify.onclick = () => simplifyTrail();
    btnCreate.onclick = () => showCreateModal();
    btnUndo.onclick = () => undoLast();
    
    // Modal handlers
    modalCancel.onclick = () => hideCreateModal();
    modalStartDraw.onclick = () => startDrawingNewTrail();
    
    // Toggle edit mode
    function toggleEditMode() {
      if (!currentTrail) return;
      
      isEditing = !isEditing;
      
      if (isEditing) {
        btnEdit.textContent = '✅ Done Editing';
        btnEdit.classList.add('active');
        log('Edit mode ON - drag vertices to adjust trail', 'info');
        
        // Add current trail to draw for editing
        const geom = draw.getAll();
        if (geom.features.length === 0) {
          // Load the current trail geometry into draw
          loadTrailIntoDraw();
        }
      } else {
        btnEdit.textContent = '✏️ Edit Trail';
        btnEdit.classList.remove('active');
        log('Edit mode OFF', 'info');
        
        // Clear draw and reload trail layers
        draw.deleteAll();
        loadTrail(currentTrail.id);
      }
    }
    
    // Load trail geometry into draw plugin for editing
    function loadTrailIntoDraw() {
      if (!currentTrail) return;
      
      // Get current geometry from analysis
      fetch(`/api/analyze/trail/${currentTrail.id}`)
        .then(res => res.json())
        .then(data => {
          if (data.geometry) {
            const feature = {
              id: currentTrail.id,
              type: 'Feature',
              geometry: data.editedGeometry || data.originalGeometry || data.geometry,
              properties: {}
            };
            draw.add(feature);
            draw.changeMode('direct_select', { featureId: currentTrail.id });
            
            // Hide the regular trail layers while editing (including portage segments)
            ['original-layer', 'edited-layer', 'portage-segments-layer'].forEach(id => {
              if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'none');
            });
          }
        });
    }
    
    // Create new trail functions
    let isDrawingNew = false;
    let pendingTrailName = '';
    let pendingTrailId = '';
    
    function showCreateModal() {
      newTrailName.value = '';
      newTrailId.value = '';
      createModal.classList.add('show');
      newTrailName.focus();
    }
    
    function hideCreateModal() {
      createModal.classList.remove('show');
    }
    
    function startDrawingNewTrail() {
      pendingTrailName = newTrailName.value.trim();
      pendingTrailId = newTrailId.value.trim();
      
      if (!pendingTrailName) {
        alert('Please enter a trail name');
        return;
      }
      
      hideCreateModal();
      isDrawingNew = true;
      
      // Update button to show we're in drawing mode
      btnCreate.textContent = '✅ Finish Drawing';
      btnCreate.classList.add('drawing');
      btnCreate.onclick = finishDrawingNewTrail;
      
      // Clear any existing drawings and enter line draw mode
      draw.deleteAll();
      draw.changeMode('draw_line_string');
      
      log(`Drawing new trail: "${pendingTrailName}" - Click to add points, double-click to finish`, 'info');
    }
    
    async function finishDrawingNewTrail() {
      const features = draw.getAll();
      
      if (features.features.length === 0) {
        log('No geometry drawn - cancelling', 'warning');
        cancelDrawingNewTrail();
        return;
      }
      
      const geometry = features.features[0].geometry;
      
      if (geometry.coordinates.length < 2) {
        log('Need at least 2 points - keep drawing', 'warning');
        return;
      }
      
      showLoading(true);
      try {
        const res = await fetch('/api/draw/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            trailId: pendingTrailId || null,
            trailName: pendingTrailName,
            geometry: geometry
          })
        });
        
        const data = await res.json();
        
        if (data.success) {
          log(`Created trail: ${data.trail.id} - ${data.trail.name}`, 'success');
          
          // Reset state
          cancelDrawingNewTrail();
          
          // Refresh trail list and load new trail
          await populateTrailDropdown();
          await loadTrail(data.trail.id);
          trailSelect.value = data.trail.id;
        } else {
          log('Create failed: ' + data.error?.message, 'error');
        }
      } catch (err) {
        log('Create failed: ' + err.message, 'error');
      } finally {
        showLoading(false);
      }
    }
    
    function cancelDrawingNewTrail() {
      isDrawingNew = false;
      pendingTrailName = '';
      pendingTrailId = '';
      btnCreate.textContent = '➕ Create New';
      btnCreate.classList.remove('drawing');
      btnCreate.onclick = showCreateModal;
      draw.deleteAll();
      draw.changeMode('simple_select');
    }
    
    // Functions
    function log(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.innerHTML = `
        <div>${message}</div>
        <div class="log-time">${new Date().toLocaleTimeString()}</div>
      `;
      logEl.insertBefore(entry, logEl.firstChild);
    }
    
    function showLoading(show) {
      loading.className = show ? 'loading show' : 'loading';
    }
    
    async function loadSession() {
      const res = await fetch('/api/session');
      session = await res.json();
      updateProgress();
      await populateTrailDropdown();
    }
    
    async function populateTrailDropdown() {
      const res = await fetch('/api/session/trails');
      const data = await res.json();
      
      trailSelect.innerHTML = '<option value="">-- Choose a trail --</option>';
      
      if (data.trails) {
        data.trails.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t.id;
          opt.textContent = `${t.id} - ${t.name} (${Math.round(t.lengthM / 1000)}km) [${t.status}]`;
          trailSelect.appendChild(opt);
        });
      }
    }
    
    function updateProgress() {
      if (!session) return;
      const { progress } = session;
      const pct = Math.round((progress.completed / progress.total) * 100);
      progressFill.style.width = pct + '%';
      progressText.textContent = `${progress.completed}/${progress.total} completed (${progress.skipped} skipped)`;
    }
    
    async function loadNextTrail() {
      showLoading(true);
      try {
        const res = await fetch('/api/session/queue/next');
        const data = await res.json();
        
        if (!data.trail) {
          log('All trails completed!', 'success');
          return;
        }
        
        await loadTrail(data.trail.id);
        log(`Loaded: ${data.trail.name} (${data.suggestedApproach})`, 'info');
        
      } catch (err) {
        log('Error loading trail: ' + err.message, 'warning');
      } finally {
        showLoading(false);
      }
    }
    
    async function loadTrail(trailId) {
      const res = await fetch(`/api/view/trail/${trailId}`);
      const data = await res.json();
      
      if (!data.success || !data.trail) {
        log(`Error loading trail: ${data.error?.message || 'Unknown error'}`, 'error');
        return;
      }
      
      currentTrail = data.trail;
      
      trailName.textContent = data.trail.name;
      trailStats.textContent = `${Math.round(data.trail.lengthM)}m • ${data.nearbyNHD.length} nearby NHD`;
      
      if (data.analysis.recommendation) {
        recommendation.style.display = 'block';
        recommendation.className = `recommendation ${data.analysis.recommendation}`;
        recText.textContent = data.analysis.recommendation.replace(/_/g, ' ');
      }
      
      btnSnap.disabled = data.nearbyNHD.length === 0;
      btnPortage.disabled = false;
      btnMarkPortage.disabled = false;
      btnClearPortages.disabled = !(data.analysis.portageSegments && data.analysis.portageSegments.length > 0);
      btnEdit.disabled = false;
      btnSimplify.disabled = false;
      btnUndo.disabled = false;
      
      // Reset edit mode when loading new trail
      if (isEditing) {
        isEditing = false;
        btnEdit.textContent = '✏️ Edit Trail';
        btnEdit.classList.remove('active');
        draw.deleteAll();
      }
      
      // Update map
      updateMapLayers(data);
      
      // Fit bounds
      if (data.bounds) {
        map.fitBounds([
          [data.bounds[0], data.bounds[1]],
          [data.bounds[2], data.bounds[3]]
        ], { padding: 50 });
      }
    }
    
    function updateMapLayers(data) {
      // Remove existing layers
      ['nhd', 'original', 'edited', 'highlight', 'portage-segments'].forEach(id => {
        if (map.getLayer(id + '-layer')) map.removeLayer(id + '-layer');
        if (map.getSource(id)) map.removeSource(id);
      });
      
      // Add NHD
      if (data.nearbyNHD && data.nearbyNHD.length > 0) {
        map.addSource('nhd', {
          type: 'geojson',
          data: {
            type: 'FeatureCollection',
            features: data.nearbyNHD.map(n => ({
              type: 'Feature',
              geometry: n.geometry,
              properties: { name: n.gnisName }
            }))
          }
        });
        map.addLayer({
          id: 'nhd-layer',
          type: 'line',
          source: 'nhd',
          paint: { 'line-color': '#0066ff', 'line-width': 3 }
        });
      }
      
      // Add original trail (red dashed)
      if (data.analysis && data.analysis.originalGeometry) {
        map.addSource('original', {
          type: 'geojson',
          data: {
            type: 'Feature',
            geometry: data.analysis.originalGeometry,
            properties: {}
          }
        });
        map.addLayer({
          id: 'original-layer',
          type: 'line',
          source: 'original',
          paint: { 
            'line-color': '#ff3333', 
            'line-width': 3,
            'line-dasharray': [2, 2]
          }
        });
      }
      
      // Add edited trail (green) if exists
      if (data.analysis && data.analysis.editedGeometry) {
        map.addSource('edited', {
          type: 'geojson',
          data: {
            type: 'Feature',
            geometry: data.analysis.editedGeometry,
            properties: {}
          }
        });
        map.addLayer({
          id: 'edited-layer',
          type: 'line',
          source: 'edited',
          paint: { 
            'line-color': '#00cc44', 
            'line-width': 4
          }
        });
      }
      
      // Add portage segments (brown/orange, thicker) if any exist
      if (data.analysis && data.analysis.portageSegments && data.analysis.portageSegments.length > 0) {
        map.addSource('portage-segments', {
          type: 'geojson',
          data: {
            type: 'FeatureCollection',
            features: data.analysis.portageSegments.map(p => ({
              type: 'Feature',
              geometry: p.geometry,
              properties: {
                name: p.name || 'Unmarked Portage',
                distanceM: p.distanceM,
                distanceRods: p.distanceRods,
                difficulty: p.difficulty || 'unknown'
              }
            }))
          }
        });
        
        map.addLayer({
          id: 'portage-segments-layer',
          type: 'line',
          source: 'portage-segments',
          paint: { 
            'line-color': '#ff9800', 
            'line-width': 6
          }
        });
        
        // Add click handler for portage segments
        map.on('click', 'portage-segments-layer', (e) => {
          const props = e.features[0].properties;
          new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`
              <strong>${props.name}</strong><br>
              ${props.distanceM ? `${props.distanceM}m (${props.distanceRods} rods)<br>` : ''}
              Difficulty: ${props.difficulty}
            `)
            .addTo(map);
        });
        
        map.on('mouseenter', 'portage-segments-layer', () => {
          map.getCanvas().style.cursor = 'pointer';
        });
        map.on('mouseleave', 'portage-segments-layer', () => {
          map.getCanvas().style.cursor = '';
        });
        
        log(`Trail has ${data.analysis.portageSegments.length} marked portage(s)`, 'info');
      }
    }
    
    async function snapCurrentTrail() {
      if (!currentTrail) return;
      
      showLoading(true);
      try {
        const analysisRes = await fetch(`/api/analyze/trail/${currentTrail.id}`);
        const analysis = await analysisRes.json();
        
        const res = await fetch('/api/draw/snap', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            trailId: currentTrail.id,
            nhdIds: analysis.suggestedNHDIds
          })
        });
        
        const data = await res.json();
        log(`Snapped to ${analysis.suggestedNHDIds.length} NHD segments`, 'success');
        
        await loadTrail(currentTrail.id);
        
      } catch (err) {
        log('Snap failed: ' + err.message, 'warning');
      } finally {
        showLoading(false);
      }
    }
    
    async function simplifyTrail() {
      if (!currentTrail) return;
      
      const tolerance = prompt('Simplification tolerance in meters (higher = fewer points):', '50');
      if (!tolerance) return;
      
      showLoading(true);
      try {
        const res = await fetch('/api/draw/simplify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            trailId: currentTrail.id,
            tolerance: parseFloat(tolerance)
          })
        });
        
        const data = await res.json();
        if (data.success) {
          log(`Simplified: ${data.originalPoints} → ${data.newPoints} points`, 'success');
          await loadTrail(currentTrail.id);
        } else {
          log('Simplify failed: ' + data.error?.message, 'error');
        }
      } catch (err) {
        log('Simplify failed: ' + err.message, 'warning');
      } finally {
        showLoading(false);
      }
    }
    
    async function snapToPortage() {
      if (!currentTrail) return;
      
      showLoading(true);
      log('Searching for portage trails in view...', 'info');
      
      try {
        // Query Mapbox for path features in the current view
        // Look for roads with class 'path', 'track', or 'footway'
        const pathFeatures = map.queryRenderedFeatures({
          layers: ['road-path', 'road-pedestrian', 'road-footway', 'road-steps']
        });
        
        // Also try querying by source layer for the streets tileset
        const allRoadFeatures = map.queryRenderedFeatures({
          layers: map.getStyle().layers
            .filter(l => l.id.includes('road') || l.id.includes('path'))
            .map(l => l.id)
        });
        
        // Filter for path-like features
        const paths = allRoadFeatures.filter(f => {
          const cls = f.properties.class || f.properties.type || '';
          return ['path', 'track', 'footway', 'pedestrian', 'trail'].includes(cls);
        });
        
        if (paths.length === 0) {
          log('No portage/path features found in current view. Try zooming in.', 'warning');
          showLoading(false);
          return;
        }
        
        // Extract geometries
        const pathGeometries = paths.map(f => f.geometry);
        
        log(`Found ${paths.length} path segments. Snapping...`, 'info');
        
        const res = await fetch('/api/draw/snap-portage', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            trailId: currentTrail.id,
            pathGeometries: pathGeometries,
            tolerance: 50
          })
        });
        
        const data = await res.json();
        if (data.success) {
          log(`Snapped to portage: ${data.pointsSnapped}/${data.totalPoints} points`, 'success');
          await loadTrail(currentTrail.id);
        } else {
          log('Snap portage failed: ' + data.error?.message, 'error');
        }
      } catch (err) {
        log('Snap portage failed: ' + err.message, 'warning');
      } finally {
        showLoading(false);
      }
    }
    
    // Mark Portage Mode
    let markPortageMode = false;
    let portageClicks = [];
    let portageMarkers = [];
    
    function startMarkPortageMode() {
      if (!currentTrail) return;
      
      if (markPortageMode) {
        cancelMarkPortageMode();
        return;
      }
      
      markPortageMode = true;
      portageClicks = [];
      btnMarkPortage.textContent = '❌ Cancel';
      btnMarkPortage.classList.add('active');
      
      log('Click on the trail near the START of the portage', 'info');
      
      // Add click handler for the map
      map.on('click', handlePortageClick);
      map.getCanvas().style.cursor = 'crosshair';
    }
    
    function cancelMarkPortageMode() {
      markPortageMode = false;
      portageClicks = [];
      btnMarkPortage.textContent = '🏕️ Mark Portage';
      btnMarkPortage.classList.remove('active');
      map.off('click', handlePortageClick);
      map.getCanvas().style.cursor = '';
      
      // Remove any temp markers
      portageMarkers.forEach(m => m.remove());
      portageMarkers = [];
    }
    
    async function handlePortageClick(e) {
      if (!markPortageMode) return;
      
      const lngLat = e.lngLat;
      portageClicks.push([lngLat.lng, lngLat.lat]);
      
      // Add a marker at the click point
      const marker = new mapboxgl.Marker({ color: portageClicks.length === 1 ? '#4caf50' : '#f44336' })
        .setLngLat(lngLat)
        .addTo(map);
      portageMarkers.push(marker);
      
      if (portageClicks.length === 1) {
        log('Now click near the END of the portage', 'info');
      } else if (portageClicks.length === 2) {
        // We have both points - find and mark the portage
        await findAndMarkPortage(portageClicks[0], portageClicks[1]);
        cancelMarkPortageMode();
      }
    }
    
    async function findAndMarkPortage(startPoint, endPoint) {
      showLoading(true);
      
      try {
        const res = await fetch('/api/draw/mark-portage', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            trailId: currentTrail.id,
            startPoint: startPoint,
            endPoint: endPoint
          })
        });
        
        const data = await res.json();
        
        if (data.success) {
          if (data.portage) {
            log(`Marked portage: ${data.portage.name} (${data.portage.distanceM}m, ${data.portage.difficulty})`, 'success');
          } else {
            log('Portage section marked (no nearby landing found for auto-fill)', 'warning');
          }
          await loadTrail(currentTrail.id);
        } else {
          log('Mark portage failed: ' + data.error?.message, 'error');
        }
      } catch (err) {
        log('Mark portage failed: ' + err.message, 'error');
      } finally {
        showLoading(false);
      }
    }
    
    async function clearPortages() {
      if (!currentTrail) return;
      
      if (!confirm('Clear all portages from this trail?')) return;
      
      showLoading(true);
      try {
        const res = await fetch('/api/draw/clear-portages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trailId: currentTrail.id })
        });
        
        const data = await res.json();
        if (data.success) {
          log(`Cleared ${data.clearedCount} portage(s)`, 'success');
          await loadTrail(currentTrail.id);
        } else {
          log('Clear portages failed: ' + data.error?.message, 'error');
        }
      } catch (err) {
        log('Clear portages failed: ' + err.message, 'error');
      } finally {
        showLoading(false);
      }
    }
    
    async function undoLast() {
      if (!currentTrail) return;
      
      const res = await fetch('/api/draw/undo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ trailId: currentTrail.id })
      });
      
      const data = await res.json();
      if (data.success) {
        log('Undid last operation', 'info');
        await loadTrail(currentTrail.id);
      }
    }
    
    async function skipTrail() {
      if (!currentTrail) return;
      
      await fetch(`/api/session/trail/${currentTrail.id}/complete`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'skipped' })
      });
      
      log(`Skipped: ${currentTrail.name}`, 'warning');
      await loadSession();
      await loadNextTrail();
    }
  </script>
</body>
