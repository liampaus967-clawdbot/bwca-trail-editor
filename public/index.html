<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BWCA Trail Editor</title>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.css" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    
    .container { display: flex; height: 100vh; }
    #map { flex: 1; height: 100%; }
    
    /* Sidebar - narrower, cleaner */
    .sidebar {
      width: 280px;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .sidebar-header {
      padding: 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    
    .sidebar-header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    
    .progress-bar {
      margin-top: 12px;
      background: #0f3460;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00b4d8, #0077b6);
      transition: width 0.3s;
    }
    
    .progress-text {
      font-size: 10px;
      color: #666;
      margin-top: 4px;
    }
    
    /* Trail selector */
    .trail-selector {
      padding: 12px;
      border-bottom: 1px solid #0f3460;
    }
    
    .trail-select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #0f3460;
      border-radius: 6px;
      background: #16213e;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
    }
    
    .trail-select:focus { outline: none; border-color: #00b4d8; }
    
    /* Current trail info - compact */
    .trail-info {
      padding: 12px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    
    .trail-info.empty { display: none; }
    
    .trail-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }
    
    .trail-stats {
      font-size: 11px;
      color: #888;
    }
    
    .status-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 12px;
      cursor: pointer;
    }
    
    .status-toggle input { cursor: pointer; }
    .status-toggle.completed { color: #4caf50; }
    
    /* Tool sections */
    .tool-section {
      border-bottom: 1px solid #0f3460;
    }
    
    .tool-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      background: #1a1a2e;
      transition: background 0.2s;
    }
    
    .tool-header:hover { background: #16213e; }
    
    .tool-header .chevron {
      transition: transform 0.2s;
    }
    
    .tool-section.collapsed .tool-header .chevron {
      transform: rotate(-90deg);
    }
    
    .tool-content {
      padding: 8px 12px 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    
    .tool-section.collapsed .tool-content {
      display: none;
    }
    
    /* Tool buttons - icon focused */
    .tool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 4px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 9px;
      font-weight: 500;
      transition: all 0.2s;
      background: #0f3460;
      color: #fff;
    }
    
    .tool-btn:hover { transform: translateY(-1px); filter: brightness(1.2); }
    .tool-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .tool-btn .icon { font-size: 18px; margin-bottom: 4px; }
    
    .tool-btn.primary { background: linear-gradient(135deg, #00b4d8, #0077b6); }
    .tool-btn.warning { background: #ff9800; }
    .tool-btn.danger { background: #f44336; }
    .tool-btn.success { background: #4caf50; }
    .tool-btn.purple { background: #9c27b0; }
    .tool-btn.pink { background: #ff69b4; }
    .tool-btn.brown { background: #795548; }
    
    .tool-btn.active {
      box-shadow: 0 0 12px currentColor;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    /* Activity log - minimal */
    .log-section {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .log-header {
      padding: 10px 12px;
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      border-bottom: 1px solid #0f3460;
    }
    
    .log {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    
    .log-entry {
      font-size: 11px;
      padding: 6px 8px;
      margin-bottom: 4px;
      background: #16213e;
      border-radius: 4px;
      border-left: 3px solid #333;
    }
    
    .log-entry.success { border-left-color: #4caf50; }
    .log-entry.info { border-left-color: #00b4d8; }
    .log-entry.warning { border-left-color: #ff9800; }
    .log-entry.error { border-left-color: #f44336; }
    
    .log-time { color: #555; font-size: 9px; margin-top: 2px; }
    
    /* Floating legend on map */
    .legend {
      position: absolute;
      bottom: 30px;
      left: 10px;
      background: rgba(26, 26, 46, 0.95);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      z-index: 100;
      max-width: 180px;
    }
    
    .legend-title {
      font-size: 10px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .legend-toggle {
      cursor: pointer;
      font-size: 12px;
    }
    
    .legend.collapsed .legend-items { display: none; }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
      color: #ccc;
    }
    
    .legend-item.toggle { cursor: pointer; }
    .legend-item.toggle:hover { color: #fff; }
    
    .legend-color {
      width: 16px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    
    .legend-color.dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.show { display: flex; }
    
    .modal-content {
      background: #1a1a2e;
      padding: 20px;
      border-radius: 10px;
      min-width: 300px;
      color: #fff;
    }
    
    .modal-content h3 { margin-bottom: 15px; font-size: 16px; }
    
    .modal-content label { font-size: 12px; color: #888; }
    
    .modal-content input {
      width: 100%;
      padding: 10px;
      margin: 4px 0 12px;
      border: 1px solid #0f3460;
      border-radius: 6px;
      background: #16213e;
      color: #fff;
      font-size: 13px;
    }
    
    .modal-content input:focus { outline: none; border-color: #00b4d8; }
    
    .modal-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 8px;
    }
    
    .modal-buttons button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    
    .modal-buttons .btn-cancel { background: #0f3460; color: #fff; }
    .modal-buttons .btn-confirm { background: #00b4d8; color: #fff; }
    
    /* Loading overlay */
    .loading {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      padding: 16px 32px;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      z-index: 1000;
    }
    
    .loading.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div id="map"></div>
    
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>🛶 BWCA Trail Editor</h1>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
        <div class="progress-text" id="progress-text">Loading...</div>
      </div>
      
      <div class="trail-selector">
        <select id="trail-select" class="trail-select">
          <option value="">Select a trail...</option>
        </select>
      </div>
      
      <div class="trail-info" id="trail-info-panel">
        <div class="trail-name" id="trail-name">No trail selected</div>
        <div class="trail-stats" id="trail-stats">-</div>
        <label class="status-toggle" id="status-toggle">
          <input type="checkbox" id="chk-complete">
          <span>Mark Complete</span>
        </label>
      </div>
      
      <!-- Snap Tools -->
      <div class="tool-section" id="snap-tools">
        <div class="tool-header" onclick="toggleSection('snap-tools')">
          <span>Snap Tools</span>
          <span class="chevron">▼</span>
        </div>
        <div class="tool-content">
          <button class="tool-btn primary" id="btn-snap" disabled title="Snap to NHD flowlines">
            <span class="icon">🌊</span>
            NHD
          </button>
          <button class="tool-btn brown" id="btn-portage" disabled title="Snap to portage path">
            <span class="icon">🥾</span>
            Portage
          </button>
          <button class="tool-btn pink" id="btn-snap-trail" disabled title="Connect to another trail">
            <span class="icon">🔗</span>
            Trail
          </button>
        </div>
      </div>
      
      <!-- Edit Tools -->
      <div class="tool-section" id="edit-tools">
        <div class="tool-header" onclick="toggleSection('edit-tools')">
          <span>Edit Tools</span>
          <span class="chevron">▼</span>
        </div>
        <div class="tool-content">
          <button class="tool-btn warning" id="btn-edit" disabled title="Drag vertices to edit">
            <span class="icon">✏️</span>
            Edit
          </button>
          <button class="tool-btn purple" id="btn-simplify" disabled title="Reduce vertices">
            <span class="icon">〰️</span>
            Simplify
          </button>
          <button class="tool-btn" id="btn-undo" disabled title="Undo last action">
            <span class="icon">↩️</span>
            Undo
          </button>
        </div>
      </div>
      
      <!-- Portage Tools -->
      <div class="tool-section collapsed" id="portage-tools">
        <div class="tool-header" onclick="toggleSection('portage-tools')">
          <span>Portage Markers</span>
          <span class="chevron">▼</span>
        </div>
        <div class="tool-content">
          <button class="tool-btn" id="btn-mark-portage" disabled title="Mark a portage section">
            <span class="icon">🏕️</span>
            Mark
          </button>
          <button class="tool-btn danger" id="btn-clear-portages" disabled title="Clear all portages">
            <span class="icon">🗑️</span>
            Clear
          </button>
          <button class="tool-btn success" id="btn-create" title="Draw new trail">
            <span class="icon">➕</span>
            New
          </button>
        </div>
      </div>
      
      <!-- Activity Log -->
      <div class="log-section">
        <div class="log-header">Activity</div>
        <div class="log" id="log"></div>
      </div>
    </div>
  </div>
  
  <!-- Floating Legend -->
  <div class="legend" id="legend">
    <div class="legend-title">
      <span>Layers</span>
      <span class="legend-toggle" onclick="toggleLegend()">−</span>
    </div>
    <div class="legend-items">
      <label class="legend-item toggle">
        <input type="checkbox" id="chk-portages" checked>
        <div class="legend-color dot" style="background: #e91e63"></div>
        <span>Portage Landings</span>
      </label>
      <label class="legend-item toggle">
        <input type="checkbox" id="chk-full-network">
        <div class="legend-color" style="background: #ff69b4"></div>
        <span>Full Network</span>
      </label>
      <div class="legend-item">
        <div class="legend-color" style="background: #0066ff"></div>
        <span>NHD Flowlines</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background: #ff3333; border-style: dashed"></div>
        <span>Original</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background: #00cc44"></div>
        <span>Edited</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background: #ff9800; height: 5px"></div>
        <span>Portage Section</span>
      </div>
    </div>
  </div>
  
  <div class="loading" id="loading">Processing...</div>
  
  <!-- Create Trail Modal -->
  <div class="modal" id="create-modal">
    <div class="modal-content">
      <h3>Create New Trail</h3>
      <label>Trail Name</label>
      <input type="text" id="new-trail-name" placeholder="e.g., Knife Lake Portage">
      <label>Trail ID (optional)</label>
      <input type="text" id="new-trail-id" placeholder="Auto-generated if empty">
      <div class="modal-buttons">
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
        <button class="btn-confirm" id="modal-start-draw">Start Drawing</button>
      </div>
    </div>
  </div>

  <script>
    // UI helpers
    function toggleSection(id) {
      document.getElementById(id).classList.toggle('collapsed');
    }
    
    function toggleLegend() {
      const legend = document.getElementById('legend');
      legend.classList.toggle('collapsed');
      document.querySelector('.legend-toggle').textContent = legend.classList.contains('collapsed') ? '+' : '−';
    }
    
    // State
    let map = null;
    let draw = null;
    let currentTrail = null;
    let session = null;
    let isEditing = false;
    
    // Initialize app
    async function initApp() {
      const configRes = await fetch('/api/config');
      const config = await configRes.json();
      
      mapboxgl.accessToken = config.mapboxToken;
      
      map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/satellite-streets-v12',
        center: [-91.5, 48.0],
        zoom: 8
      });
      
      draw = new MapboxDraw({
        displayControlsDefault: false,
        controls: { line_string: false, trash: true },
        defaultMode: 'simple_select',
        styles: [
          {
            id: 'gl-draw-line',
            type: 'line',
            filter: ['all', ['==', '$type', 'LineString']],
            paint: { 'line-color': '#ffcc00', 'line-width': 4 }
          },
          {
            id: 'gl-draw-point',
            type: 'circle',
            filter: ['all', ['==', '$type', 'Point'], ['==', 'meta', 'vertex']],
            paint: {
              'circle-radius': 6,
              'circle-color': '#fff',
              'circle-stroke-color': '#ffcc00',
              'circle-stroke-width': 2
            }
          },
          {
            id: 'gl-draw-point-midpoint',
            type: 'circle',
            filter: ['all', ['==', '$type', 'Point'], ['==', 'meta', 'midpoint']],
            paint: { 'circle-radius': 4, 'circle-color': '#ffcc00' }
          }
        ]
      });
      
      map.addControl(draw, 'top-left');
      map.on('draw.update', handleDrawUpdate);
      
      const socket = io();
      socket.on('trail:updated', (data) => {
        log(`Trail ${data.trailId} updated`, 'success');
        if (data.trailId === currentTrail?.id && !isEditing) {
          loadTrail(data.trailId);
        }
      });
      
      map.on('load', async () => {
        await loadSession();
        await loadPortageLandings();
        await loadFullTrailNetwork();
        log('Ready! Select a trail to begin.', 'success');
      });
    }
    
    initApp();
    
    // Load portage landings
    async function loadPortageLandings() {
      try {
        const res = await fetch('/api/portage-landings');
        const geojson = await res.json();
        
        map.addSource('portage-landings', { type: 'geojson', data: geojson });
        
        map.addLayer({
          id: 'portage-landings-layer',
          type: 'circle',
          source: 'portage-landings',
          paint: {
            'circle-radius': 6,
            'circle-color': '#e91e63',
            'circle-stroke-color': '#fff',
            'circle-stroke-width': 2
          }
        });
        
        map.on('click', 'portage-landings-layer', (e) => {
          const props = e.features[0].properties;
          new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`<strong>Portage ${props.name}</strong><br>${props.distanceM}m (${props.distanceRods} rods)`)
            .addTo(map);
        });
        
        document.getElementById('chk-portages').addEventListener('change', (e) => {
          map.setLayoutProperty('portage-landings-layer', 'visibility', e.target.checked ? 'visible' : 'none');
        });
        
      } catch (err) {
        console.error('Failed to load portage landings:', err);
      }
    }
    
    // Load full trail network
    async function loadFullTrailNetwork() {
      try {
        const res = await fetch('/api/view/all-edited');
        const geojson = await res.json();
        
        if (!geojson.features || geojson.features.length === 0) return;
        
        map.addSource('full-trail-network', { type: 'geojson', data: geojson });
        
        map.addLayer({
          id: 'full-trail-network-layer',
          type: 'line',
          source: 'full-trail-network',
          layout: { 'visibility': 'none' },
          paint: { 'line-color': '#ff69b4', 'line-width': 2, 'line-opacity': 0.8 }
        }, 'portage-landings-layer');
        
        document.getElementById('chk-full-network').addEventListener('change', (e) => {
          map.setLayoutProperty('full-trail-network-layer', 'visibility', e.target.checked ? 'visible' : 'none');
        });
        
      } catch (err) {
        console.error('Failed to load full trail network:', err);
      }
    }
    
    // Handle draw updates
    async function handleDrawUpdate(e) {
      if (!currentTrail || !isEditing) return;
      
      const feature = e.features[0];
      if (feature && feature.geometry) {
        try {
          const res = await fetch('/api/draw/update-geometry', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ trailId: currentTrail.id, geometry: feature.geometry })
          });
          const data = await res.json();
          if (data.success) log('Geometry updated', 'success');
        } catch (err) {
          log('Save failed: ' + err.message, 'error');
        }
      }
    }
    
    // DOM elements
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const trailName = document.getElementById('trail-name');
    const trailStats = document.getElementById('trail-stats');
    const trailInfoPanel = document.getElementById('trail-info-panel');
    const logEl = document.getElementById('log');
    const loading = document.getElementById('loading');
    const trailSelect = document.getElementById('trail-select');
    const statusToggle = document.getElementById('status-toggle');
    const chkComplete = document.getElementById('chk-complete');
    
    const btnSnap = document.getElementById('btn-snap');
    const btnPortage = document.getElementById('btn-portage');
    const btnSnapTrail = document.getElementById('btn-snap-trail');
    const btnEdit = document.getElementById('btn-edit');
    const btnSimplify = document.getElementById('btn-simplify');
    const btnUndo = document.getElementById('btn-undo');
    const btnMarkPortage = document.getElementById('btn-mark-portage');
    const btnClearPortages = document.getElementById('btn-clear-portages');
    const btnCreate = document.getElementById('btn-create');
    
    const createModal = document.getElementById('create-modal');
    const newTrailName = document.getElementById('new-trail-name');
    const newTrailId = document.getElementById('new-trail-id');
    const modalCancel = document.getElementById('modal-cancel');
    const modalStartDraw = document.getElementById('modal-start-draw');
    
    // Event listeners
    trailSelect.onchange = () => { if (trailSelect.value) loadTrail(trailSelect.value); };
    btnSnap.onclick = () => snapCurrentTrail();
    btnPortage.onclick = () => snapToPortage();
    btnSnapTrail.onclick = () => startSnapToTrailMode();
    btnEdit.onclick = () => toggleEditMode();
    btnSimplify.onclick = () => simplifyTrail();
    btnUndo.onclick = () => undoLast();
    btnMarkPortage.onclick = () => startMarkPortageMode();
    btnClearPortages.onclick = () => clearPortages();
    btnCreate.onclick = () => showCreateModal();
    chkComplete.onchange = () => toggleComplete();
    modalCancel.onclick = () => hideCreateModal();
    modalStartDraw.onclick = () => startDrawingNewTrail();
    
    function log(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.innerHTML = `<div>${message}</div><div class="log-time">${new Date().toLocaleTimeString()}</div>`;
      logEl.insertBefore(entry, logEl.firstChild);
      if (logEl.children.length > 50) logEl.removeChild(logEl.lastChild);
    }
    
    function showLoading(show) { loading.className = show ? 'loading show' : 'loading'; }
    
    async function loadSession() {
      const res = await fetch('/api/session');
      session = await res.json();
      updateProgress();
      await populateTrailDropdown();
    }
    
    async function populateTrailDropdown() {
      const res = await fetch('/api/session/trails');
      const data = await res.json();
      
      trailSelect.innerHTML = '<option value="">Select a trail...</option>';
      
      if (data.trails) {
        data.trails.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t.id;
          const status = t.status === 'completed' ? '✓' : t.status === 'in_progress' ? '◐' : '○';
          opt.textContent = `${status} ${t.name} (${(t.lengthM / 1000).toFixed(1)}km)`;
          trailSelect.appendChild(opt);
        });
      }
    }
    
    function updateProgress() {
      if (!session) return;
      const { progress } = session;
      const pct = Math.round((progress.completed / progress.total) * 100);
      progressFill.style.width = pct + '%';
      progressText.textContent = `${progress.completed}/${progress.total} completed`;
    }
    
    async function loadTrail(trailId) {
      const res = await fetch(`/api/view/trail/${trailId}`);
      const data = await res.json();
      
      if (!data.success || !data.trail) {
        log(`Error: ${data.error?.message || 'Unknown'}`, 'error');
        return;
      }
      
      currentTrail = data.trail;
      
      trailName.textContent = data.trail.name;
      trailStats.textContent = `${Math.round(data.trail.lengthM)}m • ${data.nearbyNHD.length} NHD nearby`;
      trailInfoPanel.classList.remove('empty');
      
      // Enable buttons
      btnSnap.disabled = data.nearbyNHD.length === 0;
      btnPortage.disabled = false;
      btnSnapTrail.disabled = false;
      btnEdit.disabled = false;
      btnSimplify.disabled = false;
      btnUndo.disabled = false;
      btnMarkPortage.disabled = false;
      btnClearPortages.disabled = !(data.analysis.portageSegments?.length > 0);
      
      // Status toggle
      const isComplete = data.trail.status === 'completed';
      chkComplete.checked = isComplete;
      statusToggle.classList.toggle('completed', isComplete);
      
      // Reset edit mode
      if (isEditing) {
        isEditing = false;
        btnEdit.classList.remove('active');
        btnEdit.querySelector('.icon').textContent = '✏️';
        draw.deleteAll();
      }
      
      updateMapLayers(data);
      
      if (data.bounds) {
        map.fitBounds([
          [data.bounds[0], data.bounds[1]],
          [data.bounds[2], data.bounds[3]]
        ], { padding: 50 });
      }
    }
    
    function updateMapLayers(data) {
      ['nhd', 'original', 'edited', 'portage-segments'].forEach(id => {
        if (map.getLayer(id + '-layer')) map.removeLayer(id + '-layer');
        if (map.getSource(id)) map.removeSource(id);
      });
      
      // NHD
      if (data.nearbyNHD?.length > 0) {
        map.addSource('nhd', {
          type: 'geojson',
          data: {
            type: 'FeatureCollection',
            features: data.nearbyNHD.map(n => ({ type: 'Feature', geometry: n.geometry, properties: {} }))
          }
        });
        map.addLayer({
          id: 'nhd-layer',
          type: 'line',
          source: 'nhd',
          paint: { 'line-color': '#0066ff', 'line-width': 3 }
        });
      }
      
      // Original trail
      if (data.analysis?.originalGeometry) {
        map.addSource('original', {
          type: 'geojson',
          data: { type: 'Feature', geometry: data.analysis.originalGeometry, properties: {} }
        });
        map.addLayer({
          id: 'original-layer',
          type: 'line',
          source: 'original',
          paint: { 'line-color': '#ff3333', 'line-width': 3, 'line-dasharray': [2, 2] }
        });
      }
      
      // Edited trail
      if (data.analysis?.editedGeometry) {
        map.addSource('edited', {
          type: 'geojson',
          data: { type: 'Feature', geometry: data.analysis.editedGeometry, properties: {} }
        });
        map.addLayer({
          id: 'edited-layer',
          type: 'line',
          source: 'edited',
          paint: { 'line-color': '#00cc44', 'line-width': 4 }
        });
      }
      
      // Portage segments
      if (data.analysis?.portageSegments?.length > 0) {
        map.addSource('portage-segments', {
          type: 'geojson',
          data: {
            type: 'FeatureCollection',
            features: data.analysis.portageSegments.map(p => ({
              type: 'Feature',
              geometry: p.geometry,
              properties: { name: p.name || 'Portage', distanceM: p.distanceM }
            }))
          }
        });
        map.addLayer({
          id: 'portage-segments-layer',
          type: 'line',
          source: 'portage-segments',
          paint: { 'line-color': '#ff9800', 'line-width': 6 }
        });
      }
    }
    
    // Edit mode
    function toggleEditMode() {
      if (!currentTrail) return;
      
      isEditing = !isEditing;
      
      if (isEditing) {
        btnEdit.classList.add('active');
        btnEdit.querySelector('.icon').textContent = '✅';
        log('Edit mode ON - drag vertices', 'info');
        loadTrailIntoDraw();
      } else {
        btnEdit.classList.remove('active');
        btnEdit.querySelector('.icon').textContent = '✏️';
        log('Edit mode OFF', 'info');
        draw.deleteAll();
        loadTrail(currentTrail.id);
      }
    }
    
    function loadTrailIntoDraw() {
      if (!currentTrail) return;
      
      fetch(`/api/analyze/trail/${currentTrail.id}`)
        .then(res => res.json())
        .then(data => {
          if (data.geometry) {
            const feature = {
              id: currentTrail.id,
              type: 'Feature',
              geometry: data.editedGeometry || data.originalGeometry || data.geometry,
              properties: {}
            };
            draw.add(feature);
            draw.changeMode('direct_select', { featureId: currentTrail.id });
            
            ['original-layer', 'edited-layer', 'portage-segments-layer'].forEach(id => {
              if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'none');
            });
          }
        });
    }
    
    // Snap to NHD
    async function snapCurrentTrail() {
      if (!currentTrail) return;
      
      showLoading(true);
      try {
        const analysisRes = await fetch(`/api/analyze/trail/${currentTrail.id}`);
        const analysis = await analysisRes.json();
        
        await fetch('/api/draw/snap', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trailId: currentTrail.id, nhdIds: analysis.suggestedNHDIds })
        });
        
        log(`Snapped to ${analysis.suggestedNHDIds.length} NHD segments`, 'success');
        await loadTrail(currentTrail.id);
      } catch (err) {
        log('Snap failed: ' + err.message, 'error');
      } finally {
        showLoading(false);
      }
    }
    
    // Snap to portage
    async function snapToPortage() {
      if (!currentTrail) return;
      
      showLoading(true);
      try {
        const pathFeatures = map.queryRenderedFeatures({
          layers: map.getStyle().layers.filter(l => l.id.includes('road') || l.id.includes('path')).map(l => l.id)
        });
        
        const paths = pathFeatures.filter(f => {
          const cls = f.properties.class || f.properties.type || '';
          return ['path', 'track', 'footway', 'pedestrian', 'trail'].includes(cls);
        });
        
        if (paths.length === 0) {
          log('No paths found. Try zooming in.', 'warning');
          showLoading(false);
          return;
        }
        
        const res = await fetch('/api/draw/snap-portage', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            trailId: currentTrail.id,
            pathGeometries: paths.map(f => f.geometry),
            tolerance: 50
          })
        });
        
        const data = await res.json();
        if (data.success) {
          log(`Snapped ${data.pointsSnapped} points to portage`, 'success');
          await loadTrail(currentTrail.id);
        }
      } catch (err) {
        log('Snap failed: ' + err.message, 'error');
      } finally {
        showLoading(false);
      }
    }
    
    // Snap to trail
    let snapTrailMode = false;
    let snapTrailClicks = [];
    let snapTrailMarkers = [];
    
    function startSnapToTrailMode() {
      if (!currentTrail) return;
      
      if (snapTrailMode) {
        cancelSnapToTrailMode();
        return;
      }
      
      if (!document.getElementById('chk-full-network').checked) {
        document.getElementById('chk-full-network').checked = true;
        map.setLayoutProperty('full-trail-network-layer', 'visibility', 'visible');
      }
      
      snapTrailMode = true;
      snapTrailClicks = [];
      btnSnapTrail.classList.add('active');
      
      log('Click on CURRENT trail (point to snap)', 'info');
      
      map.on('click', handleSnapTrailClick);
      map.getCanvas().style.cursor = 'crosshair';
    }
    
    function cancelSnapToTrailMode() {
      snapTrailMode = false;
      snapTrailClicks = [];
      btnSnapTrail.classList.remove('active');
      map.off('click', handleSnapTrailClick);
      map.getCanvas().style.cursor = '';
      snapTrailMarkers.forEach(m => m.remove());
      snapTrailMarkers = [];
    }
    
    async function handleSnapTrailClick(e) {
      if (!snapTrailMode) return;
      
      snapTrailClicks.push([e.lngLat.lng, e.lngLat.lat]);
      
      const marker = new mapboxgl.Marker({ color: snapTrailClicks.length === 1 ? '#ff69b4' : '#00ff00' })
        .setLngLat(e.lngLat)
        .addTo(map);
      snapTrailMarkers.push(marker);
      
      if (snapTrailClicks.length === 1) {
        log('Click on TARGET trail to snap to', 'info');
      } else if (snapTrailClicks.length === 2) {
        await performSnapToTrail(snapTrailClicks[0], snapTrailClicks[1]);
        cancelSnapToTrailMode();
      }
    }
    
    async function performSnapToTrail(fromPoint, toPoint) {
      showLoading(true);
      try {
        // Default 100m tolerance - snap all vertices within 100m of target trail
        const res = await fetch('/api/draw/snap-to-trail', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trailId: currentTrail.id, fromPoint, toPoint, tolerance: 100 })
        });
        
        const data = await res.json();
        if (data.success) {
          log(`Snapped ${data.verticesSnapped}/${data.totalVertices} vertices to trail`, 'success');
          await loadTrail(currentTrail.id);
        } else {
          log('Snap failed: ' + data.error?.message, 'error');
        }
      } catch (err) {
        log('Snap failed: ' + err.message, 'error');
      } finally {
        showLoading(false);
      }
    }
    
    // Mark portage mode
    let markPortageMode = false;
    let portageClicks = [];
    let portageMarkers = [];
    
    function startMarkPortageMode() {
      if (!currentTrail) return;
      
      if (markPortageMode) {
        cancelMarkPortageMode();
        return;
      }
      
      markPortageMode = true;
      portageClicks = [];
      btnMarkPortage.classList.add('active');
      
      log('Click START of portage section', 'info');
      
      map.on('click', handlePortageClick);
      map.getCanvas().style.cursor = 'crosshair';
    }
    
    function cancelMarkPortageMode() {
      markPortageMode = false;
      portageClicks = [];
      btnMarkPortage.classList.remove('active');
      map.off('click', handlePortageClick);
      map.getCanvas().style.cursor = '';
      portageMarkers.forEach(m => m.remove());
      portageMarkers = [];
    }
    
    async function handlePortageClick(e) {
      if (!markPortageMode) return;
      
      portageClicks.push([e.lngLat.lng, e.lngLat.lat]);
      
      const marker = new mapboxgl.Marker({ color: portageClicks.length === 1 ? '#4caf50' : '#f44336' })
        .setLngLat(e.lngLat)
        .addTo(map);
      portageMarkers.push(marker);
      
      if (portageClicks.length === 1) {
        log('Click END of portage section', 'info');
      } else if (portageClicks.length === 2) {
        await findAndMarkPortage(portageClicks[0], portageClicks[1]);
        cancelMarkPortageMode();
      }
    }
    
    async function findAndMarkPortage(startPoint, endPoint) {
      showLoading(true);
      try {
        const res = await fetch('/api/draw/mark-portage', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trailId: currentTrail.id, startPoint, endPoint })
        });
        
        const data = await res.json();
        if (data.success) {
          log(data.portage ? `Marked: ${data.portage.name}` : 'Portage marked', 'success');
          await loadTrail(currentTrail.id);
        }
      } catch (err) {
        log('Mark failed: ' + err.message, 'error');
      } finally {
        showLoading(false);
      }
    }
    
    async function clearPortages() {
      if (!currentTrail || !confirm('Clear all portages?')) return;
      
      showLoading(true);
      try {
        const res = await fetch('/api/draw/clear-portages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trailId: currentTrail.id })
        });
        
        const data = await res.json();
        if (data.success) {
          log(`Cleared ${data.clearedCount} portage(s)`, 'success');
          await loadTrail(currentTrail.id);
        }
      } catch (err) {
        log('Clear failed: ' + err.message, 'error');
      } finally {
        showLoading(false);
      }
    }
    
    // Simplify
    async function simplifyTrail() {
      if (!currentTrail) return;
      
      const tolerance = prompt('Simplification tolerance (meters):', '50');
      if (!tolerance) return;
      
      showLoading(true);
      try {
        const res = await fetch('/api/draw/simplify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trailId: currentTrail.id, tolerance: parseFloat(tolerance) })
        });
        
        const data = await res.json();
        if (data.success) {
          log(`Simplified: ${data.originalPoints} → ${data.newPoints} pts`, 'success');
          await loadTrail(currentTrail.id);
        }
      } catch (err) {
        log('Simplify failed: ' + err.message, 'error');
      } finally {
        showLoading(false);
      }
    }
    
    // Undo
    async function undoLast() {
      if (!currentTrail) return;
      
      const res = await fetch('/api/draw/undo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ trailId: currentTrail.id })
      });
      
      const data = await res.json();
      if (data.success) {
        log('Undone', 'info');
        await loadTrail(currentTrail.id);
      }
    }
    
    // Complete toggle
    async function toggleComplete() {
      if (!currentTrail) return;
      
      const newStatus = chkComplete.checked ? 'completed' : 'pending';
      
      try {
        const res = await fetch('/api/session/trail/' + currentTrail.id + '/status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus })
        });
        
        const data = await res.json();
        if (data.success) {
          log(`Marked ${newStatus}`, 'success');
          statusToggle.classList.toggle('completed', chkComplete.checked);
          await populateTrailDropdown();
          trailSelect.value = currentTrail.id;
        } else {
          chkComplete.checked = !chkComplete.checked;
        }
      } catch (err) {
        chkComplete.checked = !chkComplete.checked;
        log('Status update failed', 'error');
      }
    }
    
    // Create new trail
    let isDrawingNew = false;
    let pendingTrailName = '';
    let pendingTrailId = '';
    
    function showCreateModal() {
      newTrailName.value = '';
      newTrailId.value = '';
      createModal.classList.add('show');
      newTrailName.focus();
    }
    
    function hideCreateModal() {
      createModal.classList.remove('show');
    }
    
    function startDrawingNewTrail() {
      pendingTrailName = newTrailName.value.trim();
      pendingTrailId = newTrailId.value.trim();
      
      if (!pendingTrailName) {
        alert('Enter a trail name');
        return;
      }
      
      hideCreateModal();
      isDrawingNew = true;
      
      btnCreate.classList.add('active');
      btnCreate.querySelector('.icon').textContent = '✅';
      btnCreate.onclick = finishDrawingNewTrail;
      
      draw.deleteAll();
      draw.changeMode('draw_line_string');
      
      log(`Drawing: "${pendingTrailName}" - double-click to finish`, 'info');
    }
    
    async function finishDrawingNewTrail() {
      const features = draw.getAll();
      
      if (features.features.length === 0) {
        cancelDrawingNewTrail();
        return;
      }
      
      const geometry = features.features[0].geometry;
      
      if (geometry.coordinates.length < 2) {
        log('Need at least 2 points', 'warning');
        return;
      }
      
      showLoading(true);
      try {
        const res = await fetch('/api/draw/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trailId: pendingTrailId || null, trailName: pendingTrailName, geometry })
        });
        
        const data = await res.json();
        if (data.success) {
          log(`Created: ${data.trail.name}`, 'success');
          cancelDrawingNewTrail();
          await populateTrailDropdown();
          await loadTrail(data.trail.id);
          trailSelect.value = data.trail.id;
        }
      } catch (err) {
        log('Create failed: ' + err.message, 'error');
      } finally {
        showLoading(false);
      }
    }
    
    function cancelDrawingNewTrail() {
      isDrawingNew = false;
      pendingTrailName = '';
      pendingTrailId = '';
      btnCreate.classList.remove('active');
      btnCreate.querySelector('.icon').textContent = '➕';
      btnCreate.onclick = showCreateModal;
      draw.deleteAll();
      draw.changeMode('simple_select');
    }
  </script>
</body>
</html>
